name: Sync DB-IP city datasets

on:
  workflow_dispatch:
  schedule:
    # Daily, UTC. Avoid minute 0 because GitHub warns high-load schedules can be delayed/dropped.
    - cron: "23 2 * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-dbip-city
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download latest sapics DB-IP city assets
        run: |
          set -euo pipefail

          curl -fsSLo dbip-city-ipv4-num.csv.gz \
            https://github.com/sapics/ip-location-db/releases/download/latest/dbip-city-ipv4-num.csv.gz

          curl -fsSLo dbip-city-ipv6-num.csv.gz \
            https://github.com/sapics/ip-location-db/releases/download/latest/dbip-city-ipv6-num.csv.gz

          curl -fsSLo DBIP-LICENSE \
            https://raw.githubusercontent.com/sapics/ip-location-db/main/dbip-city/DBIP-LICENSE

          gzip -t dbip-city-ipv4-num.csv.gz
          gzip -t dbip-city-ipv6-num.csv.gz

      - name: Check for dataset changes
        id: dataset-changes
        run: |
          set -euo pipefail

          if git diff --quiet -- dbip-city-ipv4-num.csv.gz dbip-city-ipv6-num.csv.gz; then
            echo "No dataset changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.dataset-changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          add-paths: |
            dbip-city-ipv4-num.csv.gz
            dbip-city-ipv6-num.csv.gz
            DBIP-LICENSE
          branch: sync/dbip-city-datasets
          commit-message: Update DB-IP city datasets
          delete-branch: true
          title: Update DB-IP city datasets
          body: |
            Automated DB-IP city dataset refresh.

            Source assets:
            - https://github.com/sapics/ip-location-db/releases/download/latest/dbip-city-ipv4-num.csv.gz
            - https://github.com/sapics/ip-location-db/releases/download/latest/dbip-city-ipv6-num.csv.gz

            Validation:
            - `gzip -t dbip-city-ipv4-num.csv.gz`
            - `gzip -t dbip-city-ipv6-num.csv.gz`
          team-reviewers: accounts-deployers
